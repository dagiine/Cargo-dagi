    <!-- Hero зураг нь LCP тул хамгийн түрүүнд татна. -->
    <link rel="preload" href="./pics/hero-640.webp" as="image" type="image/webp" fetchpriority="high" imagesrcset="./pics/hero-640.webp 640w, ./pics/hero-960.webp 960w, ./pics/hero.webp 1200w" imagesizes="100vw" />

    <!-- Эхний paint-д хэрэгтэй хамгийн бага style. Том CSS файлуудыг доор async ачаална. -->
    <style>
      :root {
        --color-cream: #fffdf1;
        --color-orange: #ff9644;
        --color-brown: #562f00;
        --color-bg: var(--color-cream);
        --color-text: var(--color-brown);
        --color-muted: rgba(86, 47, 0, 0.65);
        --font-base: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --space-page: 40px;
        --radius-md: 10px;
        --radius-lg: 16px;
        --btn-bg: var(--color-orange);
        --btn-color: var(--color-cream);
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --color-bg: #141720;
          --color-text: #f1f5f9;
          --color-muted: #a8b8cc;
          --btn-bg: rgba(255, 217, 0, 1);
          --btn-color: #141720;
        }
      }
      *, *::before, *::after { box-sizing: border-box; }
      html { background: var(--color-bg); }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--color-bg);
        color: var(--color-text);
        font-family: var(--font-base);
        line-height: 1.6;
      }
      #app { min-height: 100vh; }
      .app-loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--color-muted);
        font-weight: 800;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 24px;
        border: 0;
        border-radius: var(--radius-md);
        background: var(--btn-bg);
        color: var(--btn-color);
        font-weight: 800;
        text-decoration: none;
      }
      @media (max-width: 767px) { :root { --space-page: 16px; } }
    </style>

    <!-- CSS-ийг render blocking болгохгүйгээр ачаалах жижиг helper. -->
    <script>
      function loadStyle(href) {
        var link = document.createElement("link");
        link.rel = "preload";
        link.as = "style";
        link.href = href;
        link.onload = function () {
          link.onload = null;
          link.rel = "stylesheet";
        };
        document.head.appendChild(link);
      }

      loadStyle("./styles.css");
      loadStyle("./components/header.css");
      loadStyle("./components/footer.css");
    </script>
    <noscript>
      <link rel="stylesheet" href="./styles.css" />
      <link rel="stylesheet" href="./components/header.css" />
      <link rel="stylesheet" href="./components/footer.css" />
    </noscript>

    <!-- Icon font нь render blocking биш. Ачаалагдахаас өмнө текст контент харагдана. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" />
    </noscript>
  </head>

  <body>
    <div id="app">
      <div class="app-loading">Cash 4 Cargo</div>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
