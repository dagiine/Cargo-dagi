<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Cash 4 Cargo</title>

    <!-- LCP зураг: browser hero зургийг хамгийн түрүүнд татна -->
    <link
      rel="preload"
      as="image"
      href="./pics/hero-800.webp"
      imagesrcset="./pics/hero-480.webp 480w, ./pics/hero-800.webp 800w, ./pics/hero-1200.webp 1200w"
      imagesizes="100vw"
      fetchpriority="high"
    />

    <link rel="stylesheet" href="./components/header.css" />
    <link rel="stylesheet" href="./components/footer.css" />
    <link rel="stylesheet" href="./styles.css" />

    <!-- Font/icon CSS-ийг render-blocking болгохгүйгээр ачаална -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    </noscript>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
